<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HSK Smart SRS v8.1 (1-3級対応版)</title>
<style>
:root { --primary: #4CAF50; --bg: #f5f5f7; --text: #1d1d1f; --h1: #ff4757; --h2: #ffa502; --h3: #3498db; --audio: #4a90e2; --back-bg: #2c3e50; }
* { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: var(--text); padding-bottom: 50px; overflow-x: hidden; }

/* ヘッダー・タブ */
.mode-tabs { display: flex; gap: 5px; background: #e0e0e0; padding: 4px; border-radius: 12px; margin-top: 10px; width: 90%; max-width: 400px; }
.tab-btn { flex: 1; border: none; padding: 10px; border-radius: 9px; cursor: pointer; font-size: 13px; font-weight: bold; color: #666; background: transparent; transition: 0.2s; }
.tab-btn.active { background: white; color: var(--text); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

.header-area { width: 100%; max-width: 400px; padding: 10px 0 5px 0; text-align: center; }
.stats { font-size: 14px; color: #86868b; margin-bottom: 8px; }
.progress-container { width: 90%; height: 8px; background: #ddd; border-radius: 4px; margin: 0 auto; overflow: hidden; }
.progress-inner { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s ease-out; }

/* カードエリア */
.card-area { width: 90%; max-width: 400px; height: 500px; perspective: 1000px; margin-top: 5px; }
.card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
.card.flipped { transform: rotateY(180deg); }

.card-face { 
    position: absolute; 
    width: 100%; 
    height: 100%; 
    backface-visibility: hidden; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    border-radius: 24px; 
    background: white; 
    box-shadow: 0 10px 25px rgba(0,0,0,0.08); 
    padding: 12px; 
    box-sizing: border-box; 
    overflow: hidden; 
}

.card-front { justify-content: center; }
.chinese-main { font-size: 64px; font-weight: bold; color: #333; margin: 0; }
.pinyin-main { font-size: 24px; color: #888; margin-top: 10px; }

.audio-btn { display: inline-flex; align-items: center; justify-content: center; background: var(--audio); color: white; border: none; border-radius: 10px; padding: 10px 20px; font-size: 15px; font-weight: bold; cursor: pointer; box-shadow: 0 3px 0 #357abd; transition: 0.1s; }
.audio-btn:active { transform: translateY(2px); box-shadow: none; }

/* 裏面：デザイン */
.card-back { transform: rotateY(180deg); background: var(--back-bg); color: white; justify-content: space-between; padding: 25px 12px 20px 12px; }
.back-header { text-align: center; width: 100%; }
.back-chinese { font-size: 48px; font-weight: bold; color: #fff; line-height: 1; margin: 0; }
.back-pinyin { font-size: 20px; color: var(--audio); margin: 2px 0 0 0; }
.label { font-size: 11px; font-weight: bold; color: rgba(255,255,255,0.4); display: block; margin-bottom: 2px; letter-spacing: 0.1em; text-transform: uppercase; }
.meaning-box { background: #f1c40f; color: #000; padding: 10px 10px; border-radius: 16px; font-size: 32px; font-weight: 900; box-shadow: 0 4px 10px rgba(241, 196, 15, 0.4); text-align: center; width: 100%; line-height: 1.1; }
.grammar-box { width: 100%; border-radius: 10px; padding: 10px 14px; background: rgba(255,255,255,0.1); border-left: 5px solid var(--primary); }
.grammar-text { font-size: 18px; font-weight: bold; color: #fff; font-family: monospace; }
.example-box { width: 100%; border-radius: 14px; padding: 12px; background: rgba(0,0,0,0.2); text-align: left; }

/* ピンイン配置調整 */
ruby { display: inline-flex; flex-direction: column-reverse; align-items: center; vertical-align: bottom; margin-right: 5px; font-size: 22px; line-height: 1; }
rt { display: block; font-size: 11px; color: #7cb9ff; font-weight: normal; line-height: 1.3; text-align: center; }
.ex-ja-text { font-size: 15px; color:#bdc3c7; border-top:1px solid rgba(255,255,255,0.1); padding-top:6px; margin-top:6px; }

.audio-group { display: flex; gap: 8px; margin-top: 15px; width: 100%; padding-bottom: 5px; }
.audio-group .audio-btn { flex: 1; font-size: 13px; padding: 10px; }

/* 回答ボタン */
.controls { visibility: hidden; margin-top: 15px; width: 90%; max-width: 400px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.controls.show { visibility: visible; }
.btn { padding: 20px; border: none; border-radius: 18px; font-size: 20px; font-weight: bold; cursor: pointer; }
.btn-hard { background: #e0e0e0; color: #333; }
.btn-easy { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3); }

/* ボトムメニュー */
.bottom-menu { margin-top: 30px; display: flex; flex-direction: column; gap: 10px; align-items: center; width: 90%; max-width: 400px; }
.secondary-btn { width: 100%; background: white; border: 1px solid #ddd; color: #666; padding: 12px; border-radius: 14px; cursor: pointer; font-size: 14px; font-weight: 500; transition: 0.2s; text-align: center; }
.secondary-btn:active { background: #f0f0f0; }
.danger-text { color: #ff4757; font-weight: bold; }

#word-list { display: none; width: 90%; max-width: 400px; margin-top: 15px; background: #fff9c4; padding: 15px; border-radius: 12px; font-size: 15px; color: #333; border: 1px solid #fbc02d; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.list-container { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
.list-item-row { background: white; padding: 10px 15px; border-radius: 10px; border: 1px solid #eee; font-weight: 500; display: flex; justify-content: space-between; align-items: center; }
.list-word { font-size: 18px; font-weight: bold; color: var(--back-bg); }
.list-meaning { font-size: 14px; color: #666; text-align: right; flex: 1; margin-left: 15px; }
</style>
</head>
<body>

<div class="mode-tabs">
    <button class="tab-btn active" id="tab-all" onclick="setMode('all')">全級</button>
    <button class="tab-btn" id="tab-1" onclick="setMode('1')">HSK 1</button>
    <button class="tab-btn" id="tab-2" onclick="setMode('2')">HSK 2</button>
    <button class="tab-btn" id="tab-3" onclick="setMode('3')">HSK 3</button>
</div>

<div class="header-area">
    <div class="stats" id="stats">読込中...</div>
    <div class="progress-container"><div class="progress-inner" id="pb"></div></div>
</div>

<div class="card-area">
    <div class="card" id="card" onclick="flip()">
        <div class="card-face card-front">
            <div id="lv-front" style="padding:4px 12px; border-radius:20px; color:white; font-size:12px; margin-bottom:20px; font-weight:bold;"></div>
            <div class="chinese-main" id="front-chinese"></div>
            <div class="pinyin-main" id="front-pinyin"></div>
            <button class="audio-btn" style="margin-top:40px;" onclick="handleMainAudio(event)">🔊 発音を聞く</button>
        </div>
        <div class="card-face card-back">
            <div class="back-header">
                <div class="back-chinese" id="back-chinese"></div>
                <div class="back-pinyin" id="back-pinyin"></div>
            </div>
            <div style="width: 100%;">
                <span class="label">意味</span>
                <div class="meaning-box" id="back-meaning"></div>
            </div>
            <div style="width: 100%;">
                <span class="label" style="color:var(--audio)">基本構文</span>
                <div class="grammar-box">
                    <div class="grammar-text" id="back-grammar"></div>
                </div>
            </div>
            <div style="width: 100%;">
                <div class="example-box">
                    <span class="label" style="color:var(--primary)">例文</span>
                    <div id="ex-cn-ruby"></div>
                    <div id="ex-ja" class="ex-ja-text"></div>
                </div>
                <div class="audio-group">
                    <button class="audio-btn" style="background:#444; box-shadow:0 3px 0 #222;" onclick="handleMainAudio(event)">🔊 単語</button>
                    <button class="audio-btn" style="background: var(--primary); box-shadow: 0 3px 0 #388E3C; flex:1.5;" onclick="handleExAudio(event)">🔊 例文を聞く</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="controls" id="controls">
    <button class="btn btn-hard" onclick="handleRes(event, false)">忘れた</button>
    <button class="btn btn-easy" onclick="handleRes(event, true)">覚えた</button>
</div>

<div class="bottom-menu">
    <button class="secondary-btn" onclick="restartCurrentMode()">🔄 今の選択範囲を最初からやり直す</button>
    <button class="secondary-btn" id="list-toggle" onclick="toggleList()">📋 残っている単語一覧を表示</button>
    <button class="secondary-btn danger-text" onclick="clearAllData()">🗑 全記録を完全に消去</button>
</div>

<div id="word-list"></div>

<script>
// --- [単語データ(d1, d2, d3)は省略] ---

const STORAGE_KEY = 'hsk_srs_data_v8';
let s = [];
let curW = null;
let curMode = 'all';

function init() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        s = JSON.parse(saved);
    } else {
        const all = [d1, d2, d3].join('|').split('|');
        s = all.map(x => {
            const [c, p, m, l, t, ex, g] = x.split(',');
            return { c, p, m, l, t, ex, g, nr: Date.now(), iv: 0 };
        });
        save();
    }
    setMode('all');
}

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }

function setMode(m) {
    curMode = m;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + m).classList.add('active');
    showWord();
}

function showWord() {
    const now = Date.now();
    const due = s.filter(w => (curMode === 'all' || w.l === curMode) && w.nr <= now);
    const total = s.filter(w => (curMode === 'all' || w.l === curMode)).length;
    
    const per = total > 0 ? ((total - due.length) / total * 100) : 0;
    document.getElementById('pb').style.width = per + '%';
    document.getElementById('stats').textContent = `学習済み: ${total - due.length} / 全体: ${total}`;

    if (due.length === 0) {
        curW = null;
        document.getElementById('front-chinese').textContent = "完了！";
        document.getElementById('front-pinyin').textContent = "また明日復習しましょう";
        document.getElementById('lv-front').style.display = "none";
        document.getElementById('controls').classList.remove('show');
        return;
    }

    curW = due[Math.floor(Math.random() * due.length)];
    
    const lv = document.getElementById('lv-front');
    lv.textContent = "HSK " + curW.l + "級";
    lv.style.background = curW.l === '1' ? 'var(--h1)' : curW.l === '2' ? 'var(--h2)' : 'var(--h3)';
    lv.style.display = "block";
    
    document.getElementById('front-chinese').textContent = curW.c;
    document.getElementById('front-pinyin').textContent = curW.p;
    document.getElementById('back-chinese').textContent = curW.c;
    document.getElementById('back-pinyin').textContent = curW.p;
    document.getElementById('back-meaning').textContent = curW.m;
    document.getElementById('back-grammar').textContent = curW.g || "---";

    const exArea = document.getElementById('ex-cn-ruby');
    exArea.innerHTML = "";
    const [cnPart, jaPart] = curW.ex.split(' / ');
    cnPart.split(' ').forEach(token => {
        const m = token.match(/(.*)\((.*)\)/);
        if (m) {
            const r = document.createElement('ruby');
            r.innerHTML = `${m[1]}<rt>${m[2]}</rt>`;
            exArea.appendChild(r);
        } else {
            const span = document.createElement('span');
            span.textContent = token;
            span.style.marginRight = "5px";
            exArea.appendChild(span);
        }
    });
    document.getElementById('ex-ja').textContent = jaPart;

    document.getElementById('card').classList.remove('flipped');
    document.getElementById('controls').classList.remove('show');

    // 表が表示されたタイミングで自動再生
    speak(curW.c);
}

function flip() {
    if (!curW) return;
    document.getElementById('card').classList.add('flipped');
    document.getElementById('controls').classList.add('show');
}

function handleRes(e, easy) {
    if (e) e.stopPropagation();
    if (!curW) return;

    const now = Date.now();
    if (easy) {
        curW.iv = curW.iv === 0 ? 1 : curW.iv * 2;
        // 忘却曲線の日数から4時間(4 * 60 * 60 * 1000 ms)引いた時間を設定
        const offset = 4 * 60 * 60 * 1000;
        curW.nr = now + (curW.iv * 24 * 60 * 60 * 1000) - offset;
    } else {
        curW.iv = 0;
        curW.nr = now;
    }
    save();

    const card = document.getElementById('card');
    card.classList.remove('flipped');
    document.getElementById('controls').classList.remove('show');

    setTimeout(() => {
        showWord();
    }, 300); 
}

function handleMainAudio(e) { e.stopPropagation(); if(curW) speak(curW.c); }
function handleExAudio(e) { e.stopPropagation(); if(curW) speak(curW.ex.split(' / ')[0].replace(/\(.*?\)/g, '')); }

function speak(t) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(t);
    u.lang = 'zh-CN';
    u.rate = 0.8;
    window.speechSynthesis.speak(u);
}

function clearAllData() {
    if (confirm("全ての学習記録を完全にリセットしてもよろしいですか？")) {
        localStorage.removeItem(STORAGE_KEY);
        location.reload();
    }
}

function restartCurrentMode() {
    const msg = curMode === 'all' ? "全級の進捗をリセットしますか？" : `HSK ${curMode}級の進捗をリセットしますか？`;
    if (confirm(msg)) {
        const now = Date.now();
        s.forEach(w => { if (curMode === 'all' || w.l === curMode) { w.nr = now; w.iv = 0; } });
        save();
        location.reload();
    }
}

function toggleList() {
    const list = document.getElementById('word-list');
    const btn = document.getElementById('list-toggle');
    if(list.style.display === 'block') {
        list.style.display = 'none';
        btn.textContent = "📋 残っている単語一覧を表示";
    } else {
        const now = Date.now();
        const due = s.filter(w => (curMode === 'all' || w.l === curMode) && w.nr <= now);
        if (due.length === 0) {
            list.innerHTML = "<strong>現在、習得すべき単語はありません。</strong>";
        } else {
            let html = "<strong>未習得単語リスト:</strong><div class='list-container'>";
            due.forEach(w => {
                html += `<div class='list-item-row'>
                            <span class='list-word'>${w.c}</span>
                            <span class='list-meaning'>${w.m}</span>
                         </div>`;
            });
            html += "</div>";
            list.innerHTML = html;
        }
        list.style.display = 'block';
        btn.textContent = "✖ リストを閉じる";
    }
}

window.onload = init;
</script>
