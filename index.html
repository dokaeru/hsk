<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HSK Smart SRS v8.1</title>
<style>
:root { --primary: #4CAF50; --bg: #f5f5f7; --text: #1d1d1f; --h1: #ff4757; --h2: #ffa502; --audio: #4a90e2; }

/* 画面のチラつき防止・ハイライト除去 */
* { -webkit-tap-highlight-color: transparent; outline: none; }

body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: var(--text); padding-bottom: 50px; }

/* モード切替タブ */
.mode-tabs { display: flex; gap: 5px; background: #e0e0e0; padding: 4px; border-radius: 12px; margin-top: 15px; width: 90%; max-width: 400px; }
.tab-btn { flex: 1; border: none; padding: 10px; border-radius: 9px; cursor: pointer; font-size: 13px; font-weight: bold; color: #666; background: transparent; transition: 0.2s; }
.tab-btn.active { background: white; color: var(--text); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

/* ヘッダー */
.header-area { width: 100%; max-width: 400px; padding: 15px 0 15px 0; text-align: center; position: sticky; top: 0; background: var(--bg); z-index: 10; }
.stats { font-size: 14px; color: #86868b; margin-bottom: 10px; }
.progress-container { width: 90%; height: 8px; background: #ddd; border-radius: 4px; margin: 0 auto; overflow: hidden; }
.progress-inner { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s ease-out; }

/* カードエリア */
.card-area { width: 90%; max-width: 400px; height: 500px; perspective: 1000px; margin-top: 10px; }
.card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
.card.flipped { transform: rotateY(180deg); }
.card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; border-radius: 24px; background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.08); padding: 20px; box-sizing: border-box; overflow-y: auto; }

.card-front { justify-content: center; }
.chinese-main { font-size: 56px; font-weight: bold; color: #333; }
.pinyin-main { font-size: 20px; color: #888; margin-top: 8px; }

/* 裏面（答えのページ） */
.card-back { transform: rotateY(180deg); background: #2c3e50; color: white; }
.label { font-size: 11px; font-weight: bold; color: #aaa; display: block; margin-bottom: 5px; letter-spacing: 0.1em; text-transform: uppercase; }
.back-chinese { font-size: 42px; font-weight: bold; color: #fff; margin-bottom: 5px; }
.back-pinyin { font-size: 18px; color: #4a90e2; margin-bottom: 15px; }
.meaning-box { background: #f1c40f; color: #000; padding: 15px 20px; border-radius: 16px; font-size: 28px; font-weight: 900; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(241, 196, 15, 0.4); text-align: center; width: 90%; line-height: 1.2; }

.example-box { width: 100%; border-radius: 12px; padding: 15px; box-sizing: border-box; background: rgba(0,0,0,0.2); text-align: left; }
ruby { font-size: 19px; line-height: 2.5; margin-right: 2px; }
rt { font-size: 10px; color: #7cb9ff; font-weight: normal; transform: translateY(-2px); }

/* 音声ボタン */
.audio-group { display: flex; gap: 8px; margin-top: 10px; }
.audio-btn { display: inline-flex; align-items: center; justify-content: center; background: var(--audio); color: white; border: none; border-radius: 10px; padding: 8px 15px; font-size: 13px; font-weight: bold; cursor: pointer; box-shadow: 0 3px 0 #357abd; transition: 0.1s; }
.audio-btn:active { transform: translateY(2px); box-shadow: none; }

/* 回答コントロール */
.controls { visibility: hidden; margin-top: 20px; width: 90%; max-width: 400px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.controls.show { visibility: visible; }
.btn { padding: 18px; border: none; border-radius: 16px; font-size: 18px; font-weight: bold; cursor: pointer; }
.btn-hard { background: #e0e0e0; color: #333; }
.btn-easy { background: var(--primary); color: white; }

/* 下部メニュー */
.bottom-menu { margin-top: 30px; display: flex; flex-direction: column; gap: 12px; align-items: center; width: 90%; max-width: 400px; }
.secondary-btn { width: 100%; background: white; border: 1px solid #ddd; color: #666; padding: 12px; border-radius: 12px; cursor: pointer; font-size: 14px; font-weight: 500; }
.list-area { width: 100%; background: white; border-radius: 12px; display: none; padding: 15px; box-sizing: border-box; font-size: 14px; border: 1px solid #eee; margin-top: 5px; }
.list-item { padding: 8px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
</style>
</head>
<body>

<div class="mode-tabs">
<button class="tab-btn active" id="tab-all" onclick="setMode('all')">全級</button>
<button class="tab-btn" id="tab-1" onclick="setMode('1')">HSK 1級</button>
<button class="tab-btn" id="tab-2" onclick="setMode('2')">HSK 2級</button>
</div>

<div class="header-area">
<div class="stats" id="stats">読込中...</div>
<div class="progress-container"><div class="progress-inner" id="pb"></div></div>
</div>

<div class="card-area" id="card-area">
<div class="card" id="card" onclick="flip()">
<div class="card-face card-front">
<div id="lv-front" style="padding:4px 10px; border-radius:5px; color:white; font-size:11px; margin-bottom:15px;"></div>
<div class="chinese-main" id="front-chinese"></div>
<div class="pinyin-main" id="front-pinyin"></div>
<button class="audio-btn" style="margin-top:25px;" onclick="handleMainAudio(event)">🔊 発音を聞く</button>
</div>
<div class="card-face card-back">
<div class="back-chinese" id="back-chinese"></div>
<div class="back-pinyin" id="back-pinyin"></div>
<span class="label">意味</span>
<div class="meaning-box" id="back-meaning"></div>
<div id="back-example" class="example-box">
<span class="label" style="color:var(--primary)">例文</span>
<div id="ex-cn-ruby" style="margin-bottom:10px; color: #fff;"></div>
<div id="ex-ja" style="font-size:14px; color:#bdc3c7; border-top:1px solid rgba(255,255,255,0.1); padding-top:8px;"></div>
<div class="audio-group">
<button class="audio-btn" onclick="handleMainAudio(event)">🔊 単語のみ</button>
<button class="audio-btn" style="background: var(--primary); box-shadow: 0 3px 0 #388E3C;" onclick="handleExAudio(event)">🔊 例文を聞く</button>
</div>
</div>
</div>
</div>
</div>

<div id="msg" style="display:none; text-align: center; margin-top: 50px; font-weight: bold; color: var(--primary); padding: 20px;">
🎉 選択した級の学習は完了しました！<br>
<small style="color:#888; font-weight:normal;">他の級に切り替えるか、リセットしてください。</small>
</div>

<div class="controls" id="controls">
<button class="btn btn-hard" onclick="handleRes(event, false)">忘れた</button>
<button class="btn btn-easy" onclick="handleRes(event, true)">覚えた</button>
</div>

<div class="bottom-menu">
<button class="secondary-btn" onclick="restartCurrentMode()">🔄 今の選択範囲を最初からやり直す</button>
<button class="secondary-btn" id="list-toggle" onclick="toggleList()">📋 残っている単語一覧を表示</button>
<div class="list-area" id="word-list"></div>
<button class="secondary-btn" style="color:#ff4757; border-color: #ffeadb; margin-top:20px; background: #fff5f5;" onclick="fullReset()">⚠️ 全記録を完全に消去</button>
</div>

const p = s.split(',');
return { c: p[0], p: p[1], m: p[2], l: p[3] || "1", ex: p[5] || "" };
});

const STORAGE_KEY = 'hsk_srs_v5';
let s = JSON.parse(localStorage.getItem(STORAGE_KEY)) || allData.map(w=>({...w, nr:Date.now(), iv:0}));
let curMode = 'all';
let cur = null;

function setMode(mode) {
curMode = mode;
document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
document.getElementById('tab-' + mode).classList.add('active');
document.getElementById('card').classList.remove('flipped');
document.getElementById('controls').classList.remove('show');
draw();
}

function speak(text, rate = 0.8) {
if(!text) return;
window.speechSynthesis.cancel();
const uttr = new SpeechSynthesisUtterance(text);
uttr.lang = 'zh-CN';
uttr.rate = rate;
window.speechSynthesis.speak(uttr);
}

function handleMainAudio(e) { e.stopPropagation(); if(cur) speak(cur.c, 0.8); }
function handleExAudio(e) {
e.stopPropagation();
if(!cur || !cur.ex) return;
const rawText = cur.ex.split(' / ')[0].replace(/\(.*?\)/g, "").trim();
speak(rawText, 0.7);
}

function parseRuby(text) {
return text.replace(/([一-龠]+)\((.*?)\)/g, '<ruby>$1<rt>$2</rt></ruby>');
}

function draw() {
const now = Date.now();
const filtered = s.filter(w => (curMode === 'all' || w.l === curMode));
// 忘却曲線ロジック：次回学習時間(nr)が現在(now)以前のものだけを抽出
const due = filtered.filter(w => w.nr <= now);

cur = due.length ? due[Math.floor(Math.random() * due.length)] : null;

if(!cur) {
document.getElementById('card-area').style.display='none';
document.getElementById('controls').classList.remove('show');
document.getElementById('msg').style.display='block';
updateStats(filtered, due.length);
return;
}

document.getElementById('card-area').style.display='block';
document.getElementById('msg').style.display='none';

document.getElementById('front-chinese').textContent = cur.c;
document.getElementById('front-pinyin').textContent = cur.p;
const lvF = document.getElementById('lv-front');
lvF.textContent = `HSK ${cur.l}`;
lvF.style.background = cur.l == "1" ? "var(--h1)" : "var(--h2)";

document.getElementById('back-chinese').textContent = cur.c;
document.getElementById('back-pinyin').textContent = cur.p;
document.getElementById('back-meaning').textContent = cur.m;

if(cur.ex) {
const parts = cur.ex.split(' / ');
document.getElementById('ex-cn-ruby').innerHTML = parseRuby(parts[0].trim());
document.getElementById('ex-ja').textContent = parts[1] || "";
document.getElementById('back-example').style.display = 'block';
} else {
document.getElementById('back-example').style.display = 'none';
}

updateStats(filtered, due.length);
speak(cur.c);
}

function updateStats(filteredList, dueCount) {
document.getElementById('stats').textContent = `残りの単語: ${dueCount} / ${filteredList.length}`;
const progress = filteredList.length ? ((filteredList.length - dueCount) / filteredList.length) * 100 : 0;
document.getElementById('pb').style.width = `${progress}%`;
}

function flip() {
const card = document.getElementById('card');
if(!card.classList.contains('flipped')) {
card.classList.add('flipped');
document.getElementById('controls').classList.add('show');
}
}

// 忘却曲線(SRS)アルゴリズムのコア部分
function handleRes(e, ok) {
e.stopPropagation();
const now = Date.now();
if(ok) {
// 覚えた：間隔を2.1倍に伸ばして未来へ飛ばす
cur.iv = cur.iv === 0 ? 1 : Math.floor(cur.iv * 2.1) || 3;
cur.nr = now + (cur.iv * 86400000);
} else {
// 忘れた：間隔をリセットして即座に出題リストに残す
cur.iv = 0; cur.nr = now;
}
localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
document.getElementById('card').classList.remove('flipped');
document.getElementById('controls').classList.remove('show');
setTimeout(draw, 300);
}

function restartCurrentMode() {
const modeName = curMode === 'all' ? '全て' : `HSK ${curMode}級`;
if(confirm(`${modeName}の範囲を最初から出題し直しますか？`)) {
const now = Date.now();
s.forEach(w => {
if (curMode === 'all' || w.l === curMode) {
w.nr = now;
w.iv = 0;
}
});
localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
document.getElementById('card').classList.remove('flipped');
document.getElementById('controls').classList.remove('show');
draw();
}
}

function toggleList() {
const list = document.getElementById('word-list');
const btn = document.getElementById('list-toggle');
if(list.style.display === 'block') {
list.style.display = 'none';
btn.textContent = "📋 残っている単語一覧を表示";
} else {
const now = Date.now();
const due = s.filter(w => (curMode === 'all' || w.l === curMode) && w.nr <= now);
list.innerHTML = due.map(w => `<div class="list-item"><span><b>${w.c}</b> <small>${w.p}</small> [L${w.l}]</span><span>${w.m}</span></div>`).join('') || "残っている単語はありません。";
list.style.display = 'block';
btn.textContent = "リストを閉じる";
}
}

function fullReset() {
if(confirm("全ての記録を消去して初期状態に戻します。よろしいですか？")) {
localStorage.removeItem(STORAGE_KEY);
location.reload();
}
}

draw();
</script>
</body>
</html>
